function findT(q,T){
  const low=q.toLowerCase();
  let ids=[];
  for(const r of RULES){if(r.kw.some(k=>low.includes(k))){ids=[...ids,...r.ids];}}
  if(!ids.length) return null;
  const uniq=[...new Set(ids)];
  const found=uniq.map(id=>T.find(t=>t.id===id)).filter(Boolean);
  return found.length?{best:found[0],alts:found.slice(1,4)}:null;
}

function genQuiz(lang,Lx){
  return [...T].sort(()=>Math.random()-.5).slice(0,15).map(t=>{
    const d=t[lang],qt=Math.floor(Math.random()*4),tl=Lx.LN[d.lvl]||d.lvl;
    let q,cor,gw;
    if(qt===0){q=Lx.qWhat+d.short+"?";cor=t.name;gw=T.filter(x=>x.id!==t.id).map(x=>x.name);}
    else if(qt===1){q=t.name+Lx.qType;cor=Lx.TN[t.type];gw=Object.values(Lx.TN).filter(v=>v!==Lx.TN[t.type]);}
    else if(qt===2){q=t.name+Lx.qDiff;cor=tl;gw=["Easy","Medium","Advanced"].map(x=>Lx.LN[x]||x).filter(v=>v!==tl);}
    else{q=Lx.qWhich+d.e[0]+"?";cor=t.name;gw=T.filter(x=>x.id!==t.id).map(x=>x.name);}
    return{q,correct:cor,opts:[cor,...gw.sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5),trigger:t};
  });
}

border:"none",fontSize:10,padding:0,cursor:"pointer",opacity:isFav?1:.2}}>⭐</button><button onClick={e=>{e.stopPropagation();setCmp(c=>c.find(x=>x.id===t.id)?c.filter(x=>x.id!==t.id):c.length<2?[...c,t]:[c[1],t]);}} style={{background:"transparent",border:"none",fontSize:10,padding:0,cursor:"pointer",opacity:inCmp?1:.2}}>⚖️</button></div><div style={{fontSize:20,width:34,height:34,background:`${cc(t)}22`,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:6}}>{t.icon}</div><div style={{fontWeight:700,fontSize:10,marginBottom:2,lineHeight:1.4}}>{t.name}</div><div style={{fontSize:9,color:"#555588",lineHeight:1.5,marginBottom:5}}>{d.short}</div><div style={{display:"flex",gap:3,flexWrap:"wrap"}}><span style={{background:`${cc(t)}22`,color:cc(t),fontSize:8,padding:"1px 5px",borderRadius:5}}>{Lx.CN[t.cat]||t.cat}</span><span style={{background:`${TC[t.type]}22`,color:TC[t.type],fontSize:8,padding:"1px 5px",borderRadius:5}}>{Lx.TN[t.type]}</span><span style={{background:`${dc(d.lvl)}22`,color:dc(d.lvl),fontSize:8,padding:"1px 5px",borderRadius:5}}>{Lx.LN[d.lvl]||d.lvl}</span></div></div>);})}</div>)}</>)}</div>);
}
